events {}

http {
  upstream backend {
    server server1:8080;
    server server2:8080;
  }

  server {
    listen 80;

    location / {
      proxy_pass         http://backend;
      proxy_set_header    Host $host;
      proxy_set_header    X-Real-IP $remote_addr;
      
      proxy_pass_header   X-Servidor;
    }
  }
}
